# Remap prefix to Ctrl-a (easier to reach than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Intuitive splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New windows open in current path
bind c new-window -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Mouse support (resize panes, select windows, scroll)
set -g mouse on

# Start window/pane numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# True color support (matches Ghostty)
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"

# Reduce escape delay (important for Neovim)
set -sg escape-time 10

# Increase scrollback
set -g history-limit 50000

# Focus events (needed by Neovim autoread)
set -g focus-events on

# -- TokyoNight theme colors --
set -g status-style "bg=#1a1b26,fg=#c0caf5"
set -g status-left "#[fg=#7aa2f7,bold] #S "
set -g status-right "#[fg=#565f89] %H:%M "
set -g status-left-length 20
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-format "#[fg=#565f89] #I:#W "
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#1a1b26,fg=#c0caf5"
