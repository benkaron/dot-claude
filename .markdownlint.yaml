# Markdownlint configuration
default: true

# Disable line length for prose documents
MD013: false

# Allow multiple headings with the same content
MD024: false

# Allow inline HTML (useful for GitHub-flavored markdown)
MD033: false

# Allow dollar signs in text (common in code examples)
MD014: false

# Allow trailing punctuation in headings (for FAQ style)
MD026: false

# Defer whitespace/formatting rules to prettier (prevents conflicts)
MD009: false # trailing spaces
MD010: false # hard tabs
MD030: false # list marker spacing
MD032: false # blanks around lists
MD040: false # fenced code block language
MD049: false # emphasis style
MD050: false # strong style

# Allow first line to not be a top-level heading (for command templates)
MD041: false
